# Model registry — pricing in USD per token
# Sources: provider pricing pages (approximate, verify before production use)
#
# id          : user-facing alias (used in --model / --list-models)
# litellm_model: string passed to litellm.completion() — must include provider
#               prefix where required (e.g. "mistral/mistral-small-latest")
#               Defaults to `id` when omitted (works for OpenAI models).
models:
  - id: claude-sonnet-4-5
    litellm_model: anthropic/claude-sonnet-4-5
    price_per_input_token: 0.000003
    price_per_output_token: 0.000015
    currency: USD
    enabled: true

  - id: gpt-4o
    litellm_model: openai/gpt-4o
    price_per_input_token: 0.0000025
    price_per_output_token: 0.00001
    currency: USD
    enabled: true

  - id: gpt-4o-mini
    litellm_model: openai/gpt-4o-mini
    price_per_input_token: 0.00000015
    price_per_output_token: 0.0000006
    currency: USD
    enabled: false

  - id: mistral-large-latest
    litellm_model: mistral/mistral-large-latest
    price_per_input_token: 0.000002
    price_per_output_token: 0.000006
    currency: USD
    enabled: true
    request_delay: 1.0  # secondes entre chaque requête (rate limit Mistral)

  - id: mistral-small-latest
    litellm_model: mistral/mistral-small-latest
    price_per_input_token: 0.0000002
    price_per_output_token: 0.0000006
    currency: USD
    enabled: false
    request_delay: 1.0
